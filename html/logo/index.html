<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZYHZ Elite Logo Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Inter, -apple-system, sans-serif; background: #f0f2f5; display: flex; height: 100vh; }

  .panel {
    width: 320px; background: #fff; padding: 20px; overflow-y: auto;
    box-shadow: 2px 0 12px rgba(0,0,0,0.08); flex-shrink: 0;
  }
  .panel h2 { font-size: 16px; margin-bottom: 16px; color: #333; }
  .group { margin-bottom: 18px; border-bottom: 1px solid #eee; padding-bottom: 14px; }
  .group:last-child { border-bottom: none; }
  .group h3 {
    font-size: 13px; font-weight: 600; color: #555; margin-bottom: 10px;
    border-left: 3px solid #76B900; padding-left: 8px;
  }
  .row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .row label { font-size: 12px; color: #666; white-space: nowrap; }
  .row input[type="range"] { width: 120px; }
  .row .val { font-size: 11px; color: #999; width: 42px; text-align: right; font-family: monospace; }
  .row select { width: 140px; font-size: 12px; padding: 3px 6px; }

  .btn {
    width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; margin-top: 6px; transition: all .2s;
  }
  .btn-primary { background: #76B900; color: #fff; }
  .btn-primary:hover { background: #5a8f00; }
  .btn-secondary { background: #eee; color: #333; }
  .btn-secondary:hover { background: #ddd; }

  .preview {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: background .3s; position: relative; overflow: hidden;
  }
  .preview.light { background: #ffffff; }
  .preview.dark { background: #1a1a1a; }
  .preview.green { background: #76B900; }
  .preview.gray { background: #f0f2f5; }
  .preview.checker {
    background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
      linear-gradient(-45deg, #ccc 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ccc 75%),
      linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    background-color: #fff;
  }

  #logoContainer { transition: transform .1s; }

  .ref-img {
    position: absolute; bottom: 20px; right: 20px; opacity: 0.6;
    border: 1px solid #ccc; border-radius: 4px; max-width: 280px;
  }
  .ref-img img { width: 100%; display: block; border-radius: 3px; }
  .ref-label { font-size: 10px; color: #999; text-align: center; padding: 2px 0; background: #fff; }

  textarea {
    width: 100%; height: 120px; margin-top: 8px; font-family: monospace;
    font-size: 10px; border: 1px solid #ddd; border-radius: 4px; padding: 6px; resize: vertical;
  }
  .output { display: none; }
</style>
</head>
<body>

<div class="panel">
  <h2>ZYHZ × NVIDIA Elite Logo</h2>
  <p style="font-size:11px;color:#999;margin-bottom:14px;">基于官方 AI 矢量源文件</p>

  <div class="group">
    <h3>画布</h3>
    <div class="row">
      <label>背景</label>
      <select id="bgSelect">
        <option value="light" selected>白色</option>
        <option value="gray">浅灰</option>
        <option value="dark">深色</option>
        <option value="green">NVIDIA 绿</option>
        <option value="checker">棋盘格 (验证透明)</option>
      </select>
    </div>
    <div class="row">
      <label>缩放</label>
      <input type="range" id="zoom" min="0.3" max="3" step="0.05" value="1">
      <span class="val" id="zoomVal">100%</span>
    </div>
  </div>

  <div class="group">
    <h3>整体位置与大小</h3>
    <div class="row"><label>显示宽度</label><input type="range" id="dispW" min="400" max="1200" step="10" value="800"><span class="val" id="dispWVal">800</span></div>
  </div>

  <div class="group">
    <h3>ZYHZ Logo 颜色</h3>
    <div class="row"><label>图层可见</label>
      <select id="zyhzLayer">
        <option value="colored" selected>彩色层</option>
        <option value="black">黑色层</option>
        <option value="both">双层叠加</option>
      </select>
    </div>
    <div class="row"><label>彩色层颜色</label>
      <select id="zyhzColor">
        <option value="#45a3b9" selected>原始青色 #45a3b9</option>
        <option value="#5EC9E0">亮青色 #5EC9E0</option>
        <option value="#2A788B">深青色 #2A788B</option>
        <option value="#76B900">NVIDIA 绿 #76B900</option>
        <option value="#000000">黑色</option>
        <option value="custom">自定义...</option>
      </select>
    </div>
    <div class="row" id="customColorRow" style="display:none">
      <label>自定义颜色</label>
      <input type="color" id="zyhzCustomColor" value="#45a3b9">
    </div>
  </div>

  <button class="btn btn-primary" id="btnCode">生成 SVG 代码</button>
  <div class="group" style="margin-top:12px;">
    <h3>导出 PNG</h3>
    <div class="row">
      <label>尺寸</label>
      <select id="pngSize">
        <option value="1200">1200px (网页用)</option>
        <option value="2400" selected>2400px (高清)</option>
        <option value="4800">4800px (印刷)</option>
        <option value="7200">7200px (大幅面)</option>
        <option value="9600">9600px (超大幅面)</option>
      </select>
    </div>
    <div class="row">
      <label>透明背景</label>
      <input type="checkbox" id="pngTransparent" checked>
    </div>
    <button class="btn btn-secondary" id="btnPng">导出 PNG</button>
  </div>
  <div class="output" id="outputWrap">
    <textarea id="svgCode" readonly></textarea>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// Background
$('bgSelect').addEventListener('change', e => {
  $('previewArea').className = 'preview ' + e.target.value;
});

// Zoom
$('zoom').addEventListener('input', () => {
  const v = $('zoom').value;
  $('logoContainer').style.transform = `scale(${v})`;
  $('zoomVal').textContent = Math.round(v * 100) + '%';
});

// Display width
$('dispW').addEventListener('input', () => {
  const w = $('dispW').value;
  const svg = $('logoSvg');
  const ratio = 365.33334 / 1066.6667;
  svg.setAttribute('width', w);
  svg.setAttribute('height', Math.round(w * ratio));
  $('dispWVal').textContent = w;
});

// ZYHZ layer visibility
$('zyhzLayer').addEventListener('change', () => {
  const v = $('zyhzLayer').value;
  $('layerBlack').style.display = (v === 'colored') ? 'none' : '';
  $('layerColored').style.display = (v === 'black') ? 'none' : '';
});
// Default: only show colored layer
$('layerBlack').style.display = 'none';

// ZYHZ color
function updateZyhzColor(color) {
  const paths = $('layerColored').querySelectorAll('path');
  paths.forEach(p => {
    p.style.fill = color;
  });
}

$('zyhzColor').addEventListener('change', () => {
  const v = $('zyhzColor').value;
  if (v === 'custom') {
    $('customColorRow').style.display = 'flex';
    updateZyhzColor($('zyhzCustomColor').value);
  } else {
    $('customColorRow').style.display = 'none';
    updateZyhzColor(v);
  }
});

$('zyhzCustomColor').addEventListener('input', () => {
  updateZyhzColor($('zyhzCustomColor').value);
});

// Generate SVG code
$('btnCode').addEventListener('click', () => {
  const svg = $('logoSvg');
  const code = new XMLSerializer().serializeToString(svg);
  $('svgCode').value = code;
  $('outputWrap').style.display = 'block';
});

// Export PNG
$('btnPng').addEventListener('click', () => {
  const svg = $('logoSvg');
  const pngW = parseInt($('pngSize').value);
  const pngH = Math.round(pngW * 365.33334 / 1066.6667);
  const transparent = $('pngTransparent').checked;

  // Use foreignObject + canvas approach for reliable transparency
  const canvas = document.createElement('canvas');
  canvas.width = pngW;
  canvas.height = pngH;
  const ctx = canvas.getContext('2d');

  // Always start with clear (transparent) canvas
  ctx.clearRect(0, 0, pngW, pngH);

  if (!transparent) {
    const bgMap = { light:'#ffffff', gray:'#f0f2f5', dark:'#1a1a1a', green:'#76B900', checker:'#ffffff' };
    ctx.fillStyle = bgMap[$('bgSelect').value] || '#ffffff';
    ctx.fillRect(0, 0, pngW, pngH);
  }

  // Clone and prepare SVG
  const clone = svg.cloneNode(true);
  clone.setAttribute('width', pngW);
  clone.setAttribute('height', pngH);
  // Remove any id to avoid conflicts
  clone.removeAttribute('id');

  // Serialize SVG
  const svgStr = new XMLSerializer().serializeToString(clone);
  const img = new Image();

  img.onload = () => {
    ctx.drawImage(img, 0, 0, pngW, pngH);

    // Verify transparency: check a corner pixel
    const pixel = ctx.getImageData(0, 0, 1, 1).data;
    console.log('Corner pixel RGBA:', pixel[0], pixel[1], pixel[2], pixel[3],
      '(alpha 0 = transparent, 255 = opaque)');

    canvas.toBlob((blob) => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const suffix = transparent ? '-transparent' : '';
      a.download = `zyhz-nvidia-elite-${pngW}px${suffix}.png`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }, 'image/png');
  };

  img.onerror = (e) => {
    console.error('SVG render failed:', e);
    alert('导出失败，请查看控制台');
  };

  // Encode SVG to data URI
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
});
</script>
