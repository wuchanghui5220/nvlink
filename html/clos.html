<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>High-Resolution 3-Stage Clos Network Topology</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: rgba(255,255,255,0.5);
            letter-spacing: 2px; font-size: 12px; pointer-events: none;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="overlay">3-STAGE CLOS ARCHITECTURE | DATACENTER TOPOLOGY</div>

    <script src="three.min.js"></script>
    <script src="OrbitControls.js"></script>

    <script>
        // 1. 初始化场景
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 20, 150); // 增加远距离雾化感，提升空间深邃感

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-40, 30, 50); // 调整初始视角

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 2. 颜色与配置定义 (严格匹配原图)
        const config = {
            leaf:  { color: 0xffffff, z: -15, label: 'Leaf' },  // 底层：白
            spine: { color: 0x00f2ff, z: 0,   label: 'Spine' }, // 中层：青
            core:  { color: 0xff00ff, z: 15,  label: 'Core' }   // 顶层：洋红
        };

        const allNodes = []; // 存储坐标用于连线 [layer][plane][node]

        // 3. 创建发光贴图函数 (让节点看起来像灯泡)
        function createGlowTexture(colorStr) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            const c = new THREE.Color(colorStr);
            gradient.addColorStop(0, `rgba(${c.r*255}, ${c.g*255}, ${c.b*255}, 1)`);
            gradient.addColorStop(0.2, `rgba(${c.r*255}, ${c.g*255}, ${c.b*255}, 0.3)`);
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            const tex = new THREE.Texture(canvas);
            tex.needsUpdate = true;
            return tex;
        }

        // 4. 构建三级网络
        const layerKeys = ['core', 'spine', 'leaf']; 
        layerKeys.forEach((key, lIdx) => {
            const layer = config[key];
            allNodes[lIdx] = [];

            for (let p = 0; p < 4; p++) {
                allNodes[lIdx][p] = [];
                
                // 计算平面的位置偏移 (模拟原图的阶梯透视)
                const planeX = p * 2;
                const planeY = (p - 1.5) * 6;

                // A. 绘制半透明玻璃平面
                const planeGeom = new THREE.PlaneGeometry(18, 12);
                const planeMat = new THREE.MeshPhongMaterial({
                    color: 0x222222,
                    transparent: true,
                    opacity: 0.12,
                    side: THREE.DoubleSide,
                    depthWrite: false,
                    emissive: layer.color,
                    emissiveIntensity: 0.1
                });
                const plane = new THREE.Mesh(planeGeom, planeMat);
                plane.position.set(planeX, planeY, layer.z);
                scene.add(plane);

                // B. 绘制节点
                for (let n = 0; n < 4; n++) {
                    const nodeX = planeX + (n - 1.5) * 4;
                    const nodeY = planeY + 3; // 节点稍微悬浮在平面上方

                    // 实心球体
                    const sphGeom = new THREE.SphereGeometry(0.3, 16, 16);
                    const sphMat = new THREE.MeshBasicMaterial({ color: layer.color });
                    const node = new THREE.Mesh(sphGeom, sphMat);
                    node.position.set(nodeX, nodeY, layer.z);
                    scene.add(node);
                    allNodes[lIdx][p][n] = node.position;

                    // 节点外发光 Sprite
                    const spriteMat = new THREE.SpriteMaterial({
                        map: createGlowTexture(layer.color),
                        blending: THREE.AdditiveBlending,
                        transparent: true,
                        opacity: 0.8
                    });
                    const sprite = new THREE.Sprite(spriteMat);
                    sprite.scale.set(1.8, 1.8, 1);
                    node.add(sprite);
                }
            }
        });

        // 5. 绘制 Clos 全连接连线逻辑
        function addGlowLine(v1, v2, color) {
            const geometry = new THREE.BufferGeometry().setFromPoints([v1, v2]);
            const material = new THREE.LineBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.15, // 线条不宜过粗，保持科技感
                blending: THREE.AdditiveBlending
            });
            const line = new THREE.Line(geometry, material);
            scene.add(line);
        }

        // Spine (index 1) 连接到 Leaf (index 2)
        // 逻辑：Spine 层的每个平面的第 n 个节点，连接到 Leaf 层所有平面的第 n 个节点
        for(let sp=0; sp<4; sp++) {
            for(let sn=0; sn<4; sn++) {
                for(let lp=0; lp<4; lp++) {
                    addGlowLine(allNodes[1][sp][sn], allNodes[2][lp][sn], config.spine.color);
                }
            }
        }

        // Core (index 0) 连接到 Spine (index 1)
        for(let cp=0; cp<4; cp++) {
            for(let cn=0; cn<4; cn++) {
                for(let sp=0; sp<4; sp++) {
                    addGlowLine(allNodes[0][cp][cn], allNodes[1][sp][cn], config.core.color);
                }
            }
        }

        // 6. 环境灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(20, 50, 20);
        scene.add(pointLight);

        // 7. 动画循环
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 窗口自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
