<script>
const data = JSON.parse(document.getElementById("layout-data").textContent);
document.getElementById("src-info").textContent = "数据源: " + (data.source || "?");

// 颜色：layer → CSS 变量
const TRAY_COLOR = {
  "综合布线-列走线架": "var(--tray-list)",
  "综合布线-主走线架": "var(--tray-main)",
  "综合布线-单层走线架": "var(--tray-single)",
  "综合布线-尾纤槽":   "var(--tray-fiber)",
  "信号走线架":         "var(--tray-signal)",
};

// 渲染参数
const PADDING = 1500;       // bbox 外扩（mm），视觉留白
const SVG_PIXEL_PER_MM = 0.04;  // 1mm = 0.04px → 20m = 800px
const STROKE_MM = 50;       // 描边宽（mm）

function bboxOfRoom(room, mode) {
  // mode: 'cabinets' | 'trays' | 'both'
  const xs = [], ys = [];
  const eat = (item) => {
    if (item.points) {
      for (const p of item.points) { xs.push(p[0]); ys.push(p[1]); }
    } else {
      const w = room.cab_size.w, h = room.cab_size.h;
      xs.push(item.x - w/2, item.x + w/2);
      ys.push(item.y - h/2, item.y + h/2);
    }
  };
  if (mode === 'cabinets' || mode === 'both') room.cabinets.forEach(eat);
  if (mode === 'trays' || mode === 'both')    room.trays.forEach(eat);
  if (xs.length === 0) return null;
  return {
    x_min: Math.min(...xs) - PADDING,
    x_max: Math.max(...xs) + PADDING,
    y_min: Math.min(...ys) - PADDING,
    y_max: Math.max(...ys) + PADDING,
  };
}

function svgEl(name, attrs, children) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", name);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  if (children) for (const c of children) el.appendChild(c);
  return el;
}

function renderCabinet(cab, room) {
  // 块定义 1750×600。rotation 0/180 → 长边水平；90/270 → 长边垂直。
  let w = room.cab_size.w, h = room.cab_size.h;
  if (cab.rot === 90 || cab.rot === 270) { [w, h] = [h, w]; }
  const x = cab.x - w/2;
  // SVG Y 轴向下，DXF Y 轴向上 → 反转 y
  const y = -cab.y - h/2;
  const fill = cab.kind === "rack" ? "var(--rack)" : "var(--cab)";
  const stroke = cab.kind === "rack" ? "var(--rack-stroke)" : "var(--cab-stroke)";
  return svgEl("rect", {
    x: x, y: y, width: w, height: h,
    fill: fill, stroke: stroke, "stroke-width": STROKE_MM/2,
  });
}

function renderTray(tray) {
  const color = TRAY_COLOR[tray.layer] || "#666";
  if (tray.type === "polyline") {
    const pts = tray.points.map(p => `${p[0]},${-p[1]}`).join(" ");
    return svgEl(tray.closed ? "polygon" : "polyline", {
      points: pts, fill: "none", stroke: color,
      "stroke-width": tray.width || STROKE_MM,
      "stroke-linejoin": "round", "stroke-linecap": "round",
      "opacity": 0.85,
    });
  } else {
    // INSERT — 用一个小方块标识位置
    const w = 600, h = 600;
    return svgEl("rect", {
      x: tray.x - w/2, y: -tray.y - h/2,
      width: w, height: h, fill: color, opacity: 0.7,
      stroke: "#333", "stroke-width": STROKE_MM/2,
    });
  }
}

function renderRoomView(room, mode) {
  const wrap = document.createElement("div");
  wrap.className = "canvas-wrap";

  const bb = bboxOfRoom(room, mode);
  if (!bb) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = `（${mode === 'cabinets' ? '机柜' : '线槽'} 数据为空）`;
    wrap.appendChild(empty);
    return wrap;
  }
  const W = bb.x_max - bb.x_min;
  const H = bb.y_max - bb.y_min;
  // SVG viewBox 用 mm 单位
  const svg = svgEl("svg", {
    viewBox: `${bb.x_min} ${-bb.y_max} ${W} ${H}`,
    width: Math.max(800, W * SVG_PIXEL_PER_MM),
    height: Math.max(400, H * SVG_PIXEL_PER_MM),
  });

  // 房间外框（按 bbox）
  svg.appendChild(svgEl("rect", {
    x: bb.x_min, y: -bb.y_max, width: W, height: H,
    fill: "#fff", stroke: "var(--wall)", "stroke-width": STROKE_MM,
    "stroke-dasharray": "200 100",
  }));

  // 网格（每 1m 一道淡线）
  const GRID = 1000;
  const gx0 = Math.ceil(bb.x_min / GRID) * GRID;
  for (let x = gx0; x <= bb.x_max; x += GRID) {
    svg.appendChild(svgEl("line", {
      x1: x, y1: -bb.y_max, x2: x, y2: -bb.y_min,
      stroke: "#eee", "stroke-width": 20,
    }));
  }
  const gy0 = Math.ceil(bb.y_min / GRID) * GRID;
  for (let y = gy0; y <= bb.y_max; y += GRID) {
    svg.appendChild(svgEl("line", {
      x1: bb.x_min, y1: -y, x2: bb.x_max, y2: -y,
      stroke: "#eee", "stroke-width": 20,
    }));
  }

  if (mode === 'cabinets' || mode === 'both') {
    for (const c of room.cabinets) svg.appendChild(renderCabinet(c, room));
  }
  if (mode === 'trays' || mode === 'both') {
    for (const t of room.trays) svg.appendChild(renderTray(t));
  }

  // 比例尺（左下 5m）
  const scaleY = bb.y_min + 800;
  const scaleX0 = bb.x_min + 800;
  svg.appendChild(svgEl("line", {
    x1: scaleX0, y1: -scaleY, x2: scaleX0 + 5000, y2: -scaleY,
    stroke: "#333", "stroke-width": 80,
  }));
  const txt = svgEl("text", {
    x: scaleX0 + 2500, y: -scaleY - 200,
    "text-anchor": "middle", "font-size": 350, fill: "#333",
  });
  txt.textContent = "5m";
  svg.appendChild(txt);

  wrap.appendChild(svg);
  return wrap;
}

function makeLegend(mode) {
  const div = document.createElement("div");
  div.className = "legend";
  if (mode === "cabinets") {
    div.innerHTML = `
      <span><i style="background:var(--cab)"></i> 机柜 (1750×600mm)</span>
      <span><i style="background:var(--rack)"></i> RACK15 设备</span>
    `;
  } else {
    div.innerHTML = `
      <span><i style="background:var(--tray-list)"></i> 列走线架 (300mm)</span>
      <span><i style="background:var(--tray-main)"></i> 主走线架 (800mm)</span>
      <span><i style="background:var(--tray-fiber)"></i> 尾纤槽 (240mm)</span>
      <span><i style="background:var(--tray-signal)"></i> 信号走线架</span>
      <span><i style="background:var(--tray-single)"></i> 单层走线架</span>
    `;
  }
  return div;
}

function buildPanel(room) {
  const panel = document.createElement("div");
  panel.className = "panel";
  panel.dataset.room = room.id;

  const meta = document.createElement("div");
  meta.className = "meta";
  const xr = room.cab_x_range || [0, 0];
  const yr = room.cab_y_range || [0, 0];
  const xSpan = ((xr[1] - xr[0]) / 1000).toFixed(1);
  const ySpan = ((yr[1] - yr[0]) / 1000).toFixed(1);
  meta.innerHTML = `
    <b>${room.id}</b> ·
    视图: <b>${room.view}</b> ·
    机柜数: <b>${room.cab_count}</b> · 设备数: <b>${room.rack_count || 0}</b> ·
    线槽数: <b>${room.tray_count}</b><br/>
    几何 X 跨 ${xSpan}m / Y 跨 ${ySpan}m ·
    最近 M30x 标签: <b>${room.nearest_label || "?"}</b> (距离 ${(room.nearest_label_dist/1000).toFixed(1)}m) ·
    世界中心 (${room.cab_world_x}, ${room.cab_world_y})
  `;
  panel.appendChild(meta);

  const subtabs = document.createElement("div");
  subtabs.className = "subtabs";
  const modes = [
    { key: "cabinets", label: "机柜布局" },
    { key: "trays",    label: "线槽布局" },
    { key: "both",     label: "叠加视图" },
  ];
  const viewWrap = document.createElement("div");

  function showMode(key) {
    viewWrap.innerHTML = "";
    viewWrap.appendChild(renderRoomView(room, key));
    viewWrap.appendChild(makeLegend(key));
    subtabs.querySelectorAll("button").forEach(b =>
      b.classList.toggle("active", b.dataset.mode === key));
  }

  modes.forEach(m => {
    const btn = document.createElement("button");
    btn.dataset.mode = m.key;
    btn.textContent = m.label;
    btn.onclick = () => showMode(m.key);
    subtabs.appendChild(btn);
  });
  panel.appendChild(subtabs);
  panel.appendChild(viewWrap);

  showMode("cabinets");
  return panel;
}

function build() {
  const tabs = document.getElementById("room-tabs");
  const panels = document.getElementById("panels");
  if (!data.rooms || data.rooms.length === 0) {
    panels.innerHTML = '<div class="empty">无房间数据，请先运行 scripts/hnsg_to_layout.py</div>';
    return;
  }
  data.rooms.forEach((room, i) => {
    const btn = document.createElement("button");
    btn.textContent = `${room.id} (${room.cab_count}柜)`;
    btn.title = `${room.view} · 最近 ${room.nearest_label}`;
    btn.onclick = () => {
      tabs.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      panels.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      panels.querySelectorAll(".panel")[i].classList.add("active");
    };
    if (i === 0) btn.classList.add("active");
    tabs.appendChild(btn);

    const p = buildPanel(room);
    if (i === 0) p.classList.add("active");
    panels.appendChild(p);
  });
}

build();
</script>
